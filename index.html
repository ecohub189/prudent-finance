<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prudent Finance - Auth</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 1. Add EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body id="auth-page">

    <div id="auth-container">
        <header id="auth-header">
            <h1 id="form-title">Welcome Back</h1>
            <p id="form-subtitle">Enter your details to access your account.</p>
        </header>

        <div id="error-message" class="hidden"></div>

        <form id="auth-form">
            <div class="field-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            
            <div class="field-group">
                <label for="password">Password</label>
                <input type="password" id="password" required minlength="6" placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn">Sign In</button>
        </form>

        <footer id="auth-footer">
            <span id="toggle-text">Don't have an account?</span> 
            <button id="toggle-btn" type="button">Sign Up</button>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAIJzGEUMmy1dSc6dRNFGeBZLVwd7IKA-A",
            authDomain: "prudentfinanceauth.firebaseapp.com",
            projectId: "prudentfinanceauth",
            storageBucket: "prudentfinanceauth.firebasestorage.app",
            messagingSenderId: "78320382961",
            appId: "1:78320382961:web:1751b6b8a48d39da1d0a50"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 2. Initialize EmailJS with your Public Key
        // FIXED: Added quotes around the public key string
        emailjs.init("-Si1ZuCMJ-3e1B3AU");

        // DOM Elements
        const authForm = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const toggleText = document.getElementById('toggle-text');
        const errorMessage = document.getElementById('error-message');

        let isSignUpMode = false;

        // Handle Toggle between Login and Sign Up
        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault(); 
            isSignUpMode = !isSignUpMode;
            errorMessage.classList.add('hidden');
            
            if (isSignUpMode) {
                formTitle.textContent = 'Create an Account';
                formSubtitle.textContent = 'Start your financial journey today.';
                submitBtn.textContent = 'Sign Up';
                toggleText.textContent = 'Already have an account?';
                toggleBtn.textContent = 'Sign In';
            } else {
                formTitle.textContent = 'Welcome Back';
                formSubtitle.textContent = 'Enter your details to access your account.';
                submitBtn.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account?";
                toggleBtn.textContent = 'Sign Up';
            }
        });

        // Handle Form Submission
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            errorMessage.classList.add('hidden');

            try {
                if (isSignUpMode) {
                    const result = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // Initialize User Document in Firestore
                    await setDoc(doc(db, "users", result.user.uid), {
                        email: email,
                        xp: 0,
                        level: 1,
                        streak: 1,
                        lastLogin: serverTimestamp(),
                        createdAt: serverTimestamp()
                    });

                    // 3. Send Welcome Email via EmailJS
                    // Added a try/catch specifically for the email so it doesn't break the whole app if it fails
                    try {
                        await emailjs.send("service_bzkdfcr", "template_htbyt4e", {
                            user_email: email,
                            user_name: email.split('@')[0],
                        });
                        console.log("Email sent!");
                    } catch (mailError) {
                        console.error("EmailJS Error:", mailError);
                    }

                    // Redirect after email is sent
                    window.location.href = 'home.html';

                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                    window.location.href = 'home.html';
                }
            } catch (error) {
                console.error("Auth error:", error);
                errorMessage.textContent = getFriendlyErrorMessage(error.code);
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = isSignUpMode ? 'Sign Up' : 'Sign In';
            }
        });

        // Auth State Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // We handle redirection in the submit handler to give EmailJS time
            }
        });

        function getFriendlyErrorMessage(errorCode) {
            switch (errorCode) {
                case 'auth/email-already-in-use': return 'This email is already registered.';
                case 'auth/invalid-email': return 'Please enter a valid email.';
                case 'auth/weak-password': return 'Password should be at least 6 characters.';
                case 'auth/invalid-credential': return 'Incorrect email or password.';
                default: return 'An error occurred. Please try again.';
            }
        }
    </script>
</body>
</html>
