<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Prudent Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .admin-only { border: 2px dashed #3b82f6; }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <!-- Notification Toast -->
    <div id="toast" class="hidden fixed top-5 right-5 z-[100] bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl transition-all transform translate-y-0">
        <span id="toast-message"></span>
    </div>

    <!-- Navbar -->
    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg font-bold">PF</div>
            <span class="text-xl font-bold tracking-tight text-gray-900">Prudent Finance</span>
        </div>
        
        <div class="flex items-center space-x-4 md:space-x-8">
            <div id="admin-badge" class="hidden bg-blue-100 text-blue-700 text-[10px] px-2 py-1 rounded font-black uppercase">Admin</div>
            <div class="text-center">
                <p class="text-[10px] uppercase text-gray-400 font-black">Level</p>
                <p id="nav-level" class="font-bold text-blue-600 text-sm">--</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] uppercase text-gray-400 font-black">XP</p>
                <p id="nav-xp" class="font-bold text-blue-600 text-sm">--</p>
            </div>
            <div class="text-center bg-orange-50 px-3 py-1 rounded-full border border-orange-100">
                <p class="text-[10px] uppercase text-orange-400 font-black leading-none">Streak</p>
                <p class="font-bold text-orange-600 text-sm">🔥 <span id="nav-streak">--</span></p>
            </div>
            <button id="logout-btn" class="text-sm font-semibold text-gray-500 hover:text-red-500 transition">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto mt-10 px-6 pb-12">
        <header class="mb-10">
            <h1 class="text-3xl font-extrabold text-gray-900">Welcome, <span id="user-display-email" class="text-blue-600">User</span>!</h1>
            <p class="text-gray-500 mt-1">Ready to level up your financial knowledge?</p>
        </header>

        <!-- Admin Panel -->
        <section id="admin-panel" class="hidden mb-12 bg-white p-8 rounded-2xl border-2 border-blue-500 shadow-xl">
            <h2 class="text-2xl font-bold text-blue-800 mb-6 flex items-center">
                <span class="mr-2 text-2xl">📝</span> Admin: Lesson Builder
            </h2>
            
            <div class="space-y-6">
                <!-- Basic Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-1 text-gray-600">Lesson Name</label>
                        <input type="text" id="lesson-title" placeholder="e.g. Saving Secrets" class="w-full p-3 rounded-lg border border-gray-300 outline-none focus:ring-2 focus:ring-blue-400 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 text-gray-600">Short Description</label>
                        <input type="text" id="lesson-desc" placeholder="A catchy summary..." class="w-full p-3 rounded-lg border border-gray-300 outline-none focus:ring-2 focus:ring-blue-400 transition">
                    </div>
                </div>

                <!-- Notes -->
                <div>
                    <label class="block text-sm font-bold mb-1 text-gray-600">Lesson Content (Reading Material)</label>
                    <textarea id="lesson-notes" rows="4" placeholder="Teach the topic here. Use simple language for all ages!" class="w-full p-3 rounded-lg border border-gray-300 outline-none focus:ring-2 focus:ring-blue-400 transition"></textarea>
                </div>

                <!-- Question Builder -->
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-700">Quiz Questions</h3>
                        <button id="add-question-btn" class="bg-blue-100 text-blue-600 px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-200 transition">+ Add Question</button>
                    </div>
                    <div id="questions-list" class="space-y-6">
                        <!-- Questions will appear here -->
                    </div>
                </div>

                <div class="flex items-center justify-between pt-6 border-t">
                    <p class="text-xs text-gray-400">Published lessons appear instantly for all users.</p>
                    <button id="create-lesson-btn" class="bg-blue-600 text-white font-bold py-3 px-10 rounded-xl hover:bg-blue-700 shadow-lg transition active:scale-95">
                        Publish Lesson
                    </button>
                </div>
            </div>
        </section>

        <!-- Lessons Container -->
        <h2 class="text-xl font-bold mb-4 flex items-center">
            <span class="mr-2">🚀</span> Available Lessons
        </h2>
        <div id="lessons-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="animate-pulse bg-gray-200 h-40 rounded-2xl"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, onSnapshot, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIJzGEUMmy1dSc6dRNFGeBZLVwd7IKA-A",
            authDomain: "prudentfinanceauth.firebaseapp.com",
            projectId: "prudentfinanceauth",
            storageBucket: "prudentfinanceauth.firebasestorage.app",
            messagingSenderId: "78320382961",
            appId: "1:78320382961:web:1751b6b8a48d39da1d0a50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = ["shloktanna2010@gmail.com", "aaravnpota100@gmail.com"];

        // Global state listener for auth
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('user-display-email').textContent = user.email;

            if (ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-badge').classList.remove('hidden');
                // Only add a question if the list is empty
                if (document.getElementById('questions-list').children.length === 0) {
                    addNewQuestion();
                }
            }

            await syncUserStats(user);
            setupLessonsListener();
        });

        // UI Toast function
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-message');
            msgEl.textContent = message;
            toast.className = `fixed top-5 right-5 z-[100] px-6 py-3 rounded-xl shadow-2xl transition-all transform duration-300 ${isError ? 'bg-red-600' : 'bg-green-600'} text-white`;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // --- ADMIN FUNCTIONS ---

        function addNewQuestion() {
            const qId = Date.now();
            const qContainer = document.createElement('div');
            qContainer.id = `q-container-${qId}`;
            qContainer.className = "p-5 bg-white rounded-xl border border-gray-200 relative shadow-sm";
            
            qContainer.innerHTML = `
                <button class="remove-q absolute top-3 right-3 text-gray-300 hover:text-red-500 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Question</label>
                    <input type="text" placeholder="What is a budget?" class="q-text w-full p-2 border-b-2 border-gray-100 focus:border-blue-400 outline-none font-medium transition">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">Choice A</label>
                        <input type="text" class="opt-1 w-full p-2 bg-gray-50 rounded border border-transparent focus:border-blue-200 outline-none text-sm transition">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">Choice B</label>
                        <input type="text" class="opt-2 w-full p-2 bg-gray-50 rounded border border-transparent focus:border-blue-200 outline-none text-sm transition">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">Choice C</label>
                        <input type="text" class="opt-3 w-full p-2 bg-gray-50 rounded border border-transparent focus:border-blue-200 outline-none text-sm transition">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">Choice D</label>
                        <input type="text" class="opt-4 w-full p-2 bg-gray-50 rounded border border-transparent focus:border-blue-200 outline-none text-sm transition">
                    </div>
                </div>
                <div class="mt-4 flex items-center">
                    <label class="text-xs font-bold text-blue-600 mr-3">Correct Answer:</label>
                    <select class="correct-opt bg-blue-50 text-blue-700 text-xs p-1 px-2 rounded font-bold cursor-pointer outline-none">
                        <option value="0">Choice A</option>
                        <option value="1">Choice B</option>
                        <option value="2">Choice C</option>
                        <option value="3">Choice D</option>
                    </select>
                </div>
            `;
            
            // Add click listener to remove button
            qContainer.querySelector('.remove-q').onclick = () => {
                qContainer.remove();
            };
            
            document.getElementById('questions-list').appendChild(qContainer);
        }

        document.getElementById('add-question-btn').onclick = addNewQuestion;

        document.getElementById('create-lesson-btn').onclick = async () => {
            const btn = document.getElementById('create-lesson-btn');
            const title = document.getElementById('lesson-title').value.trim();
            const desc = document.getElementById('lesson-desc').value.trim();
            const notes = document.getElementById('lesson-notes').value.trim();
            
            const qContainers = document.querySelectorAll('[id^="q-container-"]');
            
            // Validate inputs
            if (!title || !desc || !notes || qContainers.length === 0) {
                showToast("Please fill out all fields and add at least one question.", true);
                return;
            }

            const finalQuestions = Array.from(qContainers).map(cont => {
                return {
                    question: cont.querySelector('.q-text').value.trim(),
                    options: [
                        cont.querySelector('.opt-1').value.trim(),
                        cont.querySelector('.opt-2').value.trim(),
                        cont.querySelector('.opt-3').value.trim(),
                        cont.querySelector('.opt-4').value.trim()
                    ],
                    correctIndex: parseInt(cont.querySelector('.correct-opt').value)
                };
            });

            // Check for empty question fields
            if (finalQuestions.some(q => !q.question || q.options.some(o => !o))) {
                showToast("Please fill out all question texts and options.", true);
                return;
            }

            btn.disabled = true;
            btn.textContent = "Publishing...";
            btn.classList.add('opacity-50');

            try {
                await addDoc(collection(db, "lessons"), {
                    title,
                    description: desc,
                    notes: notes,
                    questions: finalQuestions,
                    createdAt: serverTimestamp(),
                    createdBy: auth.currentUser.email
                });
                
                // Clear Form
                document.getElementById('lesson-title').value = '';
                document.getElementById('lesson-desc').value = '';
                document.getElementById('lesson-notes').value = '';
                document.getElementById('questions-list').innerHTML = '';
                addNewQuestion();
                
                showToast("Lesson published successfully!");
            } catch (e) {
                console.error("Error publishing:", e);
                showToast("Error publishing: " + e.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = "Publish Lesson";
                btn.classList.remove('opacity-50');
            }
        };

        // --- LESSON DISPLAY ---

        function setupLessonsListener() {
            // No limit or complex query to avoid index errors in this sandbox
            const lessonsRef = collection(db, "lessons");
            
            onSnapshot(lessonsRef, (snapshot) => {
                const grid = document.getElementById('lessons-grid');
                grid.innerHTML = '';

                // Manual sort in JS to avoid index requirement for simple setups
                const lessons = [];
                snapshot.forEach(doc => lessons.push({id: doc.id, ...doc.data()}));
                lessons.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                lessons.forEach((lesson) => {
                    const card = document.createElement('div');
                    card.className = "group bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition relative flex flex-col";
                    
                    const isAdmin = auth.currentUser.email === ADMIN_EMAIL;

                    card.innerHTML = `
                        ${isAdmin ? `
                            <button class="delete-lesson-btn hidden group-hover:block absolute top-2 right-2 text-[10px] bg-red-50 text-red-500 px-2 py-1 rounded font-bold hover:bg-red-500 hover:text-white transition">
                                Delete
                            </button>
                        ` : ''}
                        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 font-bold text-sm">
                            ${lesson.questions?.length || 0}Q
                        </div>
                        <h3 class="font-bold text-lg text-gray-900">${lesson.title}</h3>
                        <p class="text-xs text-gray-500 mt-2 line-clamp-2 flex-grow">${lesson.description}</p>
                        <button class="mt-4 w-full py-2.5 bg-gray-50 text-blue-600 text-sm font-bold rounded-xl hover:bg-blue-600 hover:text-white transition group-hover:bg-blue-600 group-hover:text-white">
                            Start Learning
                        </button>
                    `;

                    // Handle delete button
                    if (isAdmin) {
                        card.querySelector('.delete-lesson-btn').onclick = async (e) => {
                            e.stopPropagation();
                            if (confirm("Delete this lesson? This cannot be undone.")) {
                                try {
                                    await deleteDoc(doc(db, "lessons", lesson.id));
                                    showToast("Lesson deleted.");
                                } catch (err) {
                                    showToast("Error deleting lesson.", true);
                                }
                            }
                        };
                    }

                    grid.appendChild(card);
                });

                if (snapshot.empty) {
                    grid.innerHTML = `
                        <div class="col-span-full py-10 text-center bg-white rounded-2xl border-2 border-dashed border-gray-200">
                            <p class="text-gray-400 italic">No lessons available yet. Get started by creating one!</p>
                        </div>
                    `;
                }
            });
        }

        // --- STATS LOGIC ---

        async function syncUserStats(user) {
            try {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                
                if (snap.exists()) {
                    let { streak = 1, lastLogin, xp = 0, level = 1 } = snap.data();
                    const now = new Date();
                    const last = lastLogin ? lastLogin.toDate() : new Date(0);
                    
                    if (now.toDateString() !== last.toDateString()) {
                        const diff = Math.floor((now.setHours(0,0,0,0) - last.setHours(0,0,0,0)) / 86400000);
                        streak = (diff === 1) ? streak + 1 : 1;
                        await updateDoc(userRef, { streak, lastLogin: serverTimestamp() });
                    }
                    
                    document.getElementById('nav-xp').textContent = xp;
                    document.getElementById('nav-level').textContent = level;
                    document.getElementById('nav-streak').textContent = streak;
                }
            } catch (err) {
                console.warn("Stats sync skipped or failed:", err);
            }
        }

        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>
