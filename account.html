<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - Prudent Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <!-- Notification Toast -->
    <div id="toast" class="hidden fixed top-5 right-5 z-[100] bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl transition-all">
        <span id="toast-message"></span>
    </div>

    <!-- Navbar -->
    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg font-bold">PF</div>
            <span class="text-xl font-bold tracking-tight text-gray-900">Prudent Finance</span>
        </div>
        <div class="flex items-center space-x-4">
            <a href="home.html" class="text-sm font-bold text-blue-600 hover:text-blue-800 transition">← Back to Lessons</a>
            <button id="logout-btn" class="text-sm font-semibold text-gray-400 hover:text-red-500 transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 px-6 pb-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Profile Info Card -->
            <div class="md:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center">
                    <div class="w-24 h-24 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl font-black mx-auto mb-4">
                        <span id="avatar-initial">?</span>
                    </div>
                    <h2 id="display-username" class="text-xl font-bold text-gray-900">Set Username</h2>
                    <p id="display-email" class="text-sm text-gray-400 truncate">loading...</p>
                </div>

                <div class="bg-blue-600 p-6 rounded-3xl shadow-lg text-white">
                    <h3 class="text-xs uppercase font-black tracking-widest opacity-70 mb-4">Current Level</h3>
                    <div class="flex items-end space-x-2">
                        <span class="text-5xl font-black" id="stat-level">1</span>
                        <span class="text-lg font-bold opacity-80 mb-1">Level</span>
                    </div>
                    <div class="mt-4 bg-blue-500 rounded-full h-2 overflow-hidden">
                        <div id="xp-progress-bar" class="bg-white h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <p class="text-[10px] mt-2 font-bold uppercase tracking-tighter text-blue-100">
                        <span id="stat-xp">0</span> / <span id="stat-next-level">20</span> XP to next level
                    </p>
                </div>
            </div>

            <!-- Settings & Detailed Stats -->
            <div class="md:col-span-2 space-y-6">
                
                <!-- Account Customization -->
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-bold text-gray-900 mb-6">Profile Settings</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-black text-gray-400 uppercase mb-2">Display Username</label>
                            <div class="flex space-x-2">
                                <input type="text" id="username-input" placeholder="Enter a cool username" class="flex-grow p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-400 transition">
                                <button id="save-username-btn" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Save</button>
                            </div>
                            <p class="text-[10px] text-gray-400 mt-2 italic">This is how other users will see you in the future.</p>
                        </div>
                    </div>
                </div>

                <!-- Achievements Grid -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                        <p class="text-3xl mb-1">🔥</p>
                        <p class="text-2xl font-black text-gray-900" id="stat-streak">0</p>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Day Streak</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                        <p class="text-3xl mb-1">📚</p>
                        <p class="text-2xl font-black text-gray-900" id="stat-completed">0</p>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Lessons Done</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIJzGEUMmy1dSc6dRNFGeBZLVwd7IKA-A",
            authDomain: "prudentfinanceauth.firebaseapp.com",
            projectId: "prudentfinanceauth",
            storageBucket: "prudentfinanceauth.firebasestorage.app",
            messagingSenderId: "78320382961",
            appId: "1:78320382961:web:1751b6b8a48d39da1d0a50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('display-email').textContent = user.email;
            await loadUserData(user);
        });

        async function loadUserData(user) {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            
            if (snap.exists()) {
                const data = snap.data();
                const xp = data.xp || 0;
                const level = data.level || 1;
                const streak = data.streak || 0;
                const completed = data.completedLessons?.length || 0;
                const username = data.username || "User";

                // Update UI
                document.getElementById('stat-level').textContent = level;
                document.getElementById('stat-xp').textContent = xp;
                document.getElementById('stat-streak').textContent = streak;
                document.getElementById('stat-completed').textContent = completed;
                document.getElementById('display-username').textContent = username;
                document.getElementById('avatar-initial').textContent = username.charAt(0).toUpperCase();
                document.getElementById('username-input').value = data.username || "";

                // XP Progress Bar (20 XP per level)
                const currentLevelXp = xp % 20;
                const progressPercent = (currentLevelXp / 20) * 100;
                document.getElementById('xp-progress-bar').style.width = `${progressPercent}%`;
                document.getElementById('stat-next-level').textContent = (level * 20);
            }
        }

        document.getElementById('save-username-btn').onclick = async () => {
            const user = auth.currentUser;
            const newUsername = document.getElementById('username-input').value.trim();
            const btn = document.getElementById('save-username-btn');

            if (newUsername.length < 3) {
                showToast("Username must be at least 3 characters", true);
                return;
            }

            btn.disabled = true;
            btn.textContent = "...";

            try {
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, { username: newUsername });
                
                document.getElementById('display-username').textContent = newUsername;
                document.getElementById('avatar-initial').textContent = newUsername.charAt(0).toUpperCase();
                
                showToast("Profile updated successfully!");
            } catch (e) {
                showToast("Error updating profile", true);
            } finally {
                btn.disabled = false;
                btn.textContent = "Save";
            }
        };

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-message');
            msgEl.textContent = message;
            toast.className = `fixed top-5 right-5 z-[100] px-6 py-3 rounded-xl shadow-2xl transition-all ${isError ? 'bg-red-600' : 'bg-green-600'} text-white`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>
